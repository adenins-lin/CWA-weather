<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: transparent;
        --card-bg: rgba(20, 24, 30, 0.85);
        --text-main: #FFFFFF;
        --text-sub: #A1A1AA;
    }

    * {
        box-sizing: border-box;
        font-family: 'Roboto', 'Segoe UI', sans-serif;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
    }

    #app-container {
        width: 100%;
        max-width: 1000px;
        background: #111111; 
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    #main-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #2D2D2D;
    }

    .header-title {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .live-dot {
        width: 10px;
        height: 10px;
        background-color: #EF4444;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    #update-time-text {
        color: var(--text-sub);
        font-size: 13px;
        font-weight: 500;
    }

    .dashboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        width: 100%;
    }

    .card {
        background-color: var(--card-bg);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-3px);
    }

    .card-title {
        font-size: 18px;
        color: #00E5FF; 
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 20px;
        width: 100%;
        border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        padding-bottom: 10px;
        letter-spacing: 1px;
    }

    .widget-container {
        width: 110px;
        height: 110px;
        margin-bottom: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .main-value {
        font-size: 42px;
        font-weight: 800;
        line-height: 1;
        color: #FFFFFF;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .unit {
        font-size: 18px;
        color: #FFFFFF;
        margin-left: 4px;
        vertical-align: baseline;
        opacity: 0.9;
    }

    .sub-value {
        font-size: 13px;
        color: #BBB;
        text-transform: uppercase;
        margin-top: 10px;
        letter-spacing: 1px;
        font-weight: 500;
    }
    
    .sub-value-2 {
        font-size: 12px;
        color: #AAA;
        margin-top: 6px;
        font-weight: 500;
    }

    .emoji-face {
        font-size: 70px;
        line-height: 1;
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    }

    #loading, #error-msg { text-align: center; padding: 20px; font-size: 15px; width: 100%; grid-column: 1 / -1; }
    #error-msg { color: #EF4444; display: none; }

    @media (max-width: 768px) {
        .dashboard { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
        .dashboard { grid-template-columns: 1fr; }
        .main-value { font-size: 36px; }
    }
</style>
</head>
<body>

<div id="app-container">
    <div id="main-header">
        <h2 class="header-title">
            <div class="live-dot"></div>
            白沙屯 自動氣象站
        </h2>
        <div id="update-time-text">等待資料載入中...</div>
    </div>

    <div id="loading">📡 正在讀取觀測站資料...</div>
    <div id="error-msg">無法取得資料，請稍後再試。</div>

    <div class="dashboard" id="dashboard" style="display: none;">
        </div>
</div>

<script>

    const driveUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
    
    // 改用更穩定的 corsproxy.io，並加入時間戳記防快取
    function getFetchUrl() {
        const urlWithTime = `${driveUrl}&t=${new Date().getTime()}`;
        return `https://corsproxy.io/?${encodeURIComponent(urlWithTime)}`;
    }

    function buildSVGTempGauge(temp) {
        if (temp === -99 || isNaN(temp)) return '';
        const minT = -10; const maxT = 40;
        let percent = (temp - minT) / (maxT - minT);
        if (percent < 0) percent = 0; if (percent > 1) percent = 1;
        const angle = -135 + (percent * 270);
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));">
            <defs>
                <linearGradient id="coolGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#145A6E" />
                    <stop offset="20%" stop-color="#8CD0E3" />
                    <stop offset="60%" stop-color="#1A8A4D" />
                    <stop offset="100%" stop-color="#84C665" />
                </linearGradient>
                <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#FCE182" />
                    <stop offset="30%" stop-color="#F28E19" />
                    <stop offset="60%" stop-color="#DE1A2C" />
                    <stop offset="100%" stop-color="#702282" />
                </linearGradient>
            </defs>
            <path d="M 22 75 A 38 38 0 1 1 78 75" fill="none" stroke="#222" stroke-width="16" stroke-linecap="round" />
            <path d="M 22 75 A 38 38 0 0 1 50 12" fill="none" stroke="url(#coolGrad)" stroke-width="16" stroke-linecap="round" />
            <path d="M 50 12 A 38 38 0 0 1 78 75" fill="none" stroke="url(#warmGrad)" stroke-width="16" stroke-linecap="round" />
            <g transform="translate(50, 50) rotate(${angle})">
                <line x1="0" y1="0" x2="0" y2="-28" stroke="#FFF" stroke-width="4.5" stroke-linecap="round"/>
                <circle cx="0" cy="0" r="7" fill="#FFF"/>
            </g>
        </svg>
        `;
    }

    function buildSVGHumidity(hum) {
        if (hum === -99 || isNaN(hum)) return '';
        const radius = 38;
        const circum = 2 * Math.PI * radius;
        const dash = (hum / 100) * circum;
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%; transform: rotate(-90deg); filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));">
            <circle cx="50" cy="50" r="${radius}" fill="#455A64" opacity="0.3" />
            <circle cx="50" cy="50" r="${radius}" fill="none" stroke="#0EA5E9" stroke-width="24" stroke-dasharray="${dash} ${circum}" opacity="0.85" />
            <circle cx="50" cy="50" r="26" fill="var(--card-bg)" />
        </svg>
        `;
    }

    function buildSVGWind(dir, speed) {
        if (dir === -99 || isNaN(dir)) return '';
        let ticks = '';
        for (let i = 0; i < 360; i += 5) {
            const isMajor = i % 90 === 0;
            const len = isMajor ? 5 : 2;
            ticks += `<line x1="50" y1="8" x2="50" y2="${8 + len}" stroke="${isMajor ? '#FFF' : '#666'}" stroke-width="${isMajor ? 2 : 1}" transform="rotate(${i} 50 50)" />`;
        }
        
        const speedText = (speed !== -99 && !isNaN(speed)) ? speed.toFixed(1) : '--';
        
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
            ${ticks}
            <text x="50" y="22" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">北</text>
            <text x="50" y="85" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">南</text>
            <text x="21" y="53" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">西</text>
            <text x="79" y="53" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">東</text>
            
            <text x="50" y="41" fill="#A1A1AA" font-size="7" font-weight="bold" text-anchor="middle">風速</text>
            <text x="50" y="55" fill="#00E5FF" font-size="15" font-weight="bold" text-anchor="middle">${speedText}</text>
            <text x="50" y="63" fill="#A1A1AA" font-size="6" text-anchor="middle">m/s</text>

            <g transform="translate(50,50) rotate(${dir})">
                <polygon points="-5,-30 5,-30 0,-42" fill="#00E5FF" />
            </g>
        </svg>
        `;
    }

    function buildSVGPrecip(precip) {
        if (precip === -99 || isNaN(precip) || precip < 0) precip = 0;
        let percent = precip / 50; if (percent > 1) percent = 1;
        const h = 50 * percent;
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%; filter: drop-shadow(0 0 5px rgba(0,0,0,0.3));">
            <ellipse cx="50" cy="25" rx="20" ry="6" fill="none" stroke="#666" stroke-width="2"/>
            <path d="M 30 25 L 30 75 A 20 6 0 0 0 70 75 L 70 25" fill="none" stroke="#6
