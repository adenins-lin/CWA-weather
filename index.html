<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: transparent;
        --card-bg: rgba(20, 24, 30, 0.85);
        --text-main: #FFFFFF;
        --text-sub: #A1A1AA;
    }

    * {
        box-sizing: border-box;
        font-family: 'Roboto', 'Segoe UI', sans-serif;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
    }

    #app-container {
        width: 100%;
        max-width: 1000px;
        background: #111111; 
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    #main-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #2D2D2D;
    }

    .header-title {
        font-size: 20px;
        font-weight: 700;
        color: #fff;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .live-dot {
        width: 10px;
        height: 10px;
        background-color: #EF4444;
        border-radius: 50%;
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    #update-time-text {
        color: var(--text-sub);
        font-size: 13px;
        font-weight: 500;
    }

    .dashboard {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        width: 100%;
    }

    .card {
        background-color: var(--card-bg);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 22px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        backdrop-filter: blur(8px);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        transition: transform 0.2s ease;
    }

    .card:hover {
        transform: translateY(-3px);
    }

    .card-title {
        font-size: 18px;
        color: #00E5FF; 
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 20px;
        width: 100%;
        border-bottom: 1px solid rgba(0, 229, 255, 0.2);
        padding-bottom: 10px;
        letter-spacing: 1px;
    }

    .widget-container {
        width: 110px;
        height: 110px;
        margin-bottom: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .main-value {
        font-size: 42px;
        font-weight: 800;
        line-height: 1;
        color: #FFFFFF;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .unit {
        font-size: 18px;
        color: #FFFFFF;
        margin-left: 4px;
        vertical-align: baseline;
        opacity: 0.9;
    }

    .sub-value {
        font-size: 13px;
        color: #BBB;
        text-transform: uppercase;
        margin-top: 10px;
        letter-spacing: 1px;
        font-weight: 500;
    }
    
    .sub-value-2 {
        font-size: 12px;
        color: #AAA;
        margin-top: 6px;
        font-weight: 500;
    }

    .emoji-face {
        font-size: 70px;
        line-height: 1;
        filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    }

    #loading, #error-msg { text-align: center; padding: 20px; font-size: 15px; width: 100%; grid-column: 1 / -1; }
    #error-msg { color: #EF4444; display: none; }

    @media (max-width: 768px) {
        .dashboard { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
        .dashboard { grid-template-columns: 1fr; }
        .main-value { font-size: 36px; }
    }
</style>
</head>
<body>

<div id="app-container">
    <div id="main-header">
        <h2 class="header-title">
            <div class="live-dot"></div>
            白沙屯馬祖 移動氣象站（測試中）
        </h2>
        <div id="update-time-text">等待資料載入中...</div>
    </div>

    <div id="loading">📡 正在讀取觀測站資料...</div>
    <div id="error-msg">無法取得資料，請稍後再試。</div>

    <div class="dashboard" id="dashboard" style="display: none;">
        </div>
</div>

<script>
    // ------------------------------------------------------------------
    // 設定資料來源 (Google Drive 檔案 ID)
    // ------------------------------------------------------------------
    const fileId = '12R1lPqj7IrjRgDz-NXtW9Uq15ptRzLyN';
    const driveUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
    
    // 改用 CodeTabs 代理伺服器，並保留時間戳記防快取
    function getFetchUrl() {
        const urlWithTime = `${driveUrl}&t=${new Date().getTime()}`;
        return `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(urlWithTime)}`;
    }

    function buildSVGTempGauge(temp) {
        if (temp === -99 || isNaN(temp)) return '';
        const minT = -10; const maxT = 40;
        let percent = (temp - minT) / (maxT - minT);
        if (percent < 0) percent = 0; if (percent > 1) percent = 1;
        const angle = -135 + (percent * 270);
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));">
            <defs>
                <linearGradient id="coolGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                    <stop offset="0%" stop-color="#145A6E" />
                    <stop offset="20%" stop-color="#8CD0E3" />
                    <stop offset="60%" stop-color="#1A8A4D" />
                    <stop offset="100%" stop-color="#84C665" />
                </linearGradient>
                <linearGradient id="warmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#FCE182" />
                    <stop offset="30%" stop-color="#F28E19" />
                    <stop offset="60%" stop-color="#DE1A2C" />
                    <stop offset="100%" stop-color="#702282" />
                </linearGradient>
            </defs>
            <path d="M 22 75 A 38 38 0 1 1 78 75" fill="none" stroke="#222" stroke-width="16" stroke-linecap="round" />
            <path d="M 22 75 A 38 38 0 0 1 50 12" fill="none" stroke="url(#coolGrad)" stroke-width="16" stroke-linecap="round" />
            <path d="M 50 12 A 38 38 0 0 1 78 75" fill="none" stroke="url(#warmGrad)" stroke-width="16" stroke-linecap="round" />
            <g transform="translate(50, 50) rotate(${angle})">
                <line x1="0" y1="0" x2="0" y2="-28" stroke="#FFF" stroke-width="4.5" stroke-linecap="round"/>
                <circle cx="0" cy="0" r="7" fill="#FFF"/>
            </g>
        </svg>
        `;
    }

    function buildSVGHumidity(hum) {
        if (hum === -99 || isNaN(hum)) return '';
        const radius = 38;
        const circum = 2 * Math.PI * radius;
        const dash = (hum / 100) * circum;
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%; transform: rotate(-90deg); filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));">
            <circle cx="50" cy="50" r="${radius}" fill="#455A64" opacity="0.3" />
            <circle cx="50" cy="50" r="${radius}" fill="none" stroke="#0EA5E9" stroke-width="24" stroke-dasharray="${dash} ${circum}" opacity="0.85" />
            <circle cx="50" cy="50" r="26" fill="var(--card-bg)" />
        </svg>
        `;
    }

    function buildSVGWind(dir, speed) {
        if (dir === -99 || isNaN(dir)) return '';
        let ticks = '';
        for (let i = 0; i < 360; i += 5) {
            const isMajor = i % 90 === 0;
            const len = isMajor ? 5 : 2;
            ticks += `<line x1="50" y1="8" x2="50" y2="${8 + len}" stroke="${isMajor ? '#FFF' : '#666'}" stroke-width="${isMajor ? 2 : 1}" transform="rotate(${i} 50 50)" />`;
        }
        
        const speedText = (speed !== -99 && !isNaN(speed)) ? speed.toFixed(1) : '--';
        
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
            ${ticks}
            <text x="50" y="22" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">北</text>
            <text x="50" y="85" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">南</text>
            <text x="21" y="53" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">西</text>
            <text x="79" y="53" fill="#FFF" font-size="9" font-weight="bold" text-anchor="middle">東</text>
            
            <text x="50" y="41" fill="#A1A1AA" font-size="7" font-weight="bold" text-anchor="middle">風速</text>
            <text x="50" y="55" fill="#00E5FF" font-size="15" font-weight="bold" text-anchor="middle">${speedText}</text>
            <text x="50" y="63" fill="#A1A1AA" font-size="6" text-anchor="middle">m/s</text>

            <g transform="translate(50,50) rotate(${dir})">
                <polygon points="-5,-30 5,-30 0,-42" fill="#00E5FF" />
            </g>
        </svg>
        `;
    }

    function buildSVGPressure(press) {
        if (press === -99 || isNaN(press)) return '';
        const minP = 950; const maxP = 1050;
        let percent = (press - minP) / (maxP - minP);
        if (percent < 0) percent = 0; if (percent > 1) percent = 1;
        const angle = -135 + (percent * 270);
        let ticks = '';
        for (let i = 0; i <= 100; i += 2) {
            const a = -135 + (i * 2.7);
            const isMajor = i % 10 === 0;
            const len = isMajor ? 6 : 3;
            ticks += `<line x1="50" y1="12" x2="50" y2="${12 + len}" stroke="${isMajor ? '#CCC' : '#666'}" stroke-width="${isMajor ? 2 : 1}" transform="rotate(${a} 50 50)" />`;
        }
        return `
        <svg viewBox="0 0 100 100" style="width:100%; height:100%;">
            <circle cx="50" cy="50" r="42" fill="#3A3A3C" stroke="#222" stroke-width="2"/>
            <circle cx="50" cy="50" r="38" fill="#F4F4F5"/>
            ${ticks}
            <g fill="#111" font-size="5" text-anchor="middle" font-weight="bold">
                <text x="50" y="27" transform="rotate(-90 50 50)">950</text>
                <text x="50" y="27" transform="rotate(-40 50 50)">982</text>
                <text x="50" y="27" transform="rotate(10 50 50)">1013</text>
                <text x="50" y="27" transform="rotate(60 50 50)">1040</text>
            </g>
            <g transform="translate(50, 50) rotate(${angle})">
                <line x1="0" y1="0" x2="0" y2="-28" stroke="#EF4444" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="0" cy="0" r="4.5" fill="#EF4444"/>
                <circle cx="0" cy="-20" r="2" fill="#FFF"/>
            </g>
            <circle cx="50" cy="50" r="1.5" fill="#000"/>
        </svg>
        `;
    }

    function getWindDirectionText(degree) {
        if (degree === -99 || isNaN(degree)) return '無風';
        const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
        const index = Math.floor((degree + 11.25) / 22.5) % 16;
        return directions[index];
    }

    // 根據國民健康署 HPA 標準分類酷熱指數
    function getHeatIndexInfo(hi) {
        if (hi === -99 || isNaN(hi)) return { text: '--', emoji: '🤔', color: '#FFFFFF' };
        if (hi < 26) return { text: '安全', emoji: '😊', color: '#2ecc71' };       // 綠色
        if (hi < 32) return { text: '注意', emoji: '😅', color: '#f1c40f' };       // 黃色
        if (hi < 41) return { text: '極度注意', emoji: '🥵', color: '#e67e22' };   // 橘色
        if (hi < 54) return { text: '危險', emoji: '😱', color: '#e74c3c' };       // 紅色
        return { text: '極度危險', emoji: '💀', color: '#9b59b6' };                // 紫色
    }

    async function fetchWeather() {
        try {
            const response = await fetch(getFetchUrl());
            if (!response.ok) throw new Error('網路請求失敗');
            
            const text = await response.text();
            const parts = text.split(',');

            if (parts.length < 19) {
                throw new Error('找不到測站資料或格式錯誤');
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-msg').style.display = 'none';
            
            const dashboard = document.getElementById('dashboard');
            dashboard.style.display = 'grid';

            // 1. 解析時間欄位
            const dateStr = parts[3];
            const hour = dateStr.substring(8, 10);
            const min = dateStr.substring(10, 12);
            document.getElementById('update-time-text').innerText = `觀測時間: ${hour}:${min} (自動更新中)`;

            // 2. 對應移動氣象站的檔案參數
            const pres = parseFloat(parts[4]);   
            const t = parseFloat(parts[5]);      
            const rh = parseFloat(parts[6]);     
            const ws = parseFloat(parts[9]);     
            const wd = parseFloat(parts[10]);    
            const hi = parseFloat(parts[13]);    // 酷熱指數 (第14項)
            const lat = parseFloat(parts[17]);   // 緯度 (第18項)
            const lon = parseFloat(parts[18]);   // 經度 (第19項)

            const hiInfo = getHeatIndexInfo(hi);
            const reversedWindDir = (wd !== -99 && !isNaN(wd)) ? (wd + 180) % 360 : -99;
            
            // 地圖 Iframe HTML 生成
            let mapHtml = '';
            if (!isNaN(lat) && !isNaN(lon) && lat !== -99 && lon !== -99) {
                mapHtml = `<iframe width="100%" height="100%" frameborder="0" style="border:0;" src="https://maps.google.com/maps?q=${lat},${lon}&hl=zh-TW&z=15&output=embed" allowfullscreen></iframe>`;
            } else {
                mapHtml = `<div style="display:flex; align-items:center; justify-content:center; width:100%; height:100%; font-size:12px; color:#aaa;">無法定位</div>`;
            }

            dashboard.innerHTML = `
                <div class="card">
                    <div class="card-title">目前溫度</div>
                    <div class="widget-container">${buildSVGTempGauge(t)}</div>
                    <div>
                        <span class="main-value">${isNaN(t) || t === -99 ? '--' : t.toFixed(1)}</span><span class="unit">°C</span>
                        <div class="sub-value">TEMPERATURE</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">酷熱指數</div>
                    <div class="widget-container">
                        <div class="emoji-face">${hiInfo.emoji}</div>
                    </div>
                    <div>
                        <span class="main-value" style="color: ${hiInfo.color};">${isNaN(hi) || hi === -99 ? '--' : hi.toFixed(1)}</span><span class="unit" style="color: ${hiInfo.color};">°C</span>
                        <div class="sub-value" style="color: ${hiInfo.color}; font-size: 14px; font-weight: bold;">${hiInfo.text}</div>
                        <div class="sub-value-2">HEAT INDEX</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">相對濕度</div>
                    <div class="widget-container">${buildSVGHumidity(rh)}</div>
                    <div>
                        <span class="main-value">${isNaN(rh) || rh === -99 ? '--' : Math.round(rh)}</span><span class="unit">%</span>
                        <div class="sub-value">HUMIDITY</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">風向風速</div>
                    <div class="widget-container">${buildSVGWind(reversedWindDir, ws)}</div>
                    <div>
                        <span class="main-value">${isNaN(ws) || ws === -99 ? '--' : ws.toFixed(1)}</span><span class="unit">m/s</span>
                        <div class="sub-value-2">${isNaN(wd) || wd === -99 ? '--' : wd}° ${getWindDirectionText(wd)}</div>
                        <div class="sub-value">WIND</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">氣象站位置</div>
                    <div class="widget-container" style="border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);">
                        ${mapHtml}
                    </div>
                    <div>
                        <span class="main-value" style="font-size: 16px; letter-spacing: 1px;">
                            ${isNaN(lat) || lat === -99 ? '--' : lat.toFixed(4)}<br>
                            ${isNaN(lon) || lon === -99 ? '--' : lon.toFixed(4)}
                        </span>
                        <div class="sub-value" style="margin-top: 8px;">GPS LOCATION</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">大氣壓力</div>
                    <div class="widget-container">${buildSVGPressure(pres)}</div>
                    <div>
                        <span class="main-value">${isNaN(pres) || pres === -99 ? '--' : Math.round(pres)}</span><span class="unit">hPa</span>
                        <div class="sub-value">PRESSURE</div>
                    </div>
                </div>
            `;

        } catch (error) {
            console.error('資料更新錯誤:', error);
        }
    }
    
    // 網頁開啟立刻抓一次
    fetchWeather();

    // 10分鐘 (600,000毫秒) 自動抓取一次
    setInterval(fetchWeather, 600000);

</script>

</body>
</html>
